<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آن لائن تصدیق - فرد</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid header">
    <div class="logo-wrapper">
        <img src="./assets/bor-logo.png" class="logo-img">
        <span class="logo-text">لینڈ ریکارڈ مینجمنٹ انفارمیشن سسٹم</span>
    </div>
</div>

<div id="wrapper">

    <h1 class="title">آن لائن تصدیق برائے فرد</h1>

    <div class="identity-info-wrapper">
        <div class="identity-info"><label>ضلع</label><span name="district">-</span></div>
        <div class="identity-info"><label>تحصیل</label><span name="tehsil">-</span></div>
        <div class="identity-info"><label>موضع</label><span name="place">-</span></div>
        <div class="identity-info"><label>سال</label><span name="year">-</span></div>
        <div class="identity-info"><label>فرد مقصد</label><span name="purpose">-</span></div>
    </div>

    <div class="identity-info-wrapper">
        <div class="identity-info"><label>نام</label><span name="nameFName">-</span></div>
        <div class="identity-info"><label>قوم</label><span name="tribe">-</span></div>
        <div class="identity-info"><label>CNIC</label><span name="cnic">-</span></div>
        <div class="identity-info"><label>ریکارڈ سنٹر</label><span name="recordCenter">-</span></div>
        <div class="identity-info"><label>فیس</label><span name="fee">-</span></div>
    </div>

    <div class="identity-info-wrapper">
        <div class="identity-info"><label>ٹوکن</label><span name="token">-</span></div>
        <div class="identity-info"><label>اجراء کنندہ</label><span name="issuerFullName">-</span></div>
        <div class="identity-info"><label>تاریخ</label><span name="issueDate">-</span></div>
    </div>

</div>

<footer class="footer-wrapper"></footer>

<script src="script.js"></script>

</body>
</html>
