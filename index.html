<!DOCTYPE html>
<html lang="ur">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>آن لائن تصدیق</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <img src="./assets/bor-logo.png" class="logo">
    <div class="title">لینڈ ریکارڈ مینجمنٹ انفارمیشن سسٹم</div>
</div>

<div class="container">

    <h2>آن لائن تصدیق برائے فرد</h2>

    <div class="box">
        <div>ضلع: <span name="district">-</span></div>
        <div>تحصیل: <span name="tehsil">-</span></div>
        <div>موضع: <span name="place">-</span></div>
        <div>سال: <span name="year">-</span></div>
        <div>فرد مقصد: <span name="purpose">-</span></div>
    </div>

    <div class="box">
        <div>نام: <span name="nameFName">-</span></div>
        <div>قوم: <span name="tribe">-</span></div>
        <div>CNIC: <span name="cnic">-</span></div>
        <div>ریکارڈ سنٹر: <span name="recordCenter">-</span></div>
        <div>فیس: <span name="fee">-</span></div>
    </div>

    <div class="box">
        <div>ٹوکن: <span name="token">-</span></div>
        <div>اجراء کنندہ: <span name="issuerFullName">-</span></div>
        <div>تاریخ: <span name="issueDate">-</span></div>
    </div>

</div>

<footer></footer>

<script src="script.js"></script>

</body>
</html>
